name = "festa-viva-concierge"
main = "worker/src/index.js"
compatibility_date = "2026-06-01"

routes = [
  { pattern = "claudiocode.dev/festa-viva/*", zone_name = "claudiocode.dev" }
]

[[kv_namespaces]]
binding = "FESTA_VIVA_KV"
id = "23bbfc8e649e4242b85f5c43d4961aca"

[vars]
UPSTREAM_ORIGIN = "https://claudiovestevao.github.io"
UPSTREAM_BASE_PATH = "/festa-viva"
OPENAI_MODEL = "gpt-4.1-mini"
OPENAI_REFINE_MODEL = "gpt-4.1-nano"
RESEND_FROM_NAME = "Agente Festeiro"
BRIEFING_TO_EMAIL = "contato@claudiocode.dev"
